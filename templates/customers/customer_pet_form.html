{% extends "base.html" %}
{% block content %}

<div class="pet-form-page">
    <div class="form-head">
        <h1>{{ title }} 🐾</h1>
        <p>Owner: {{ customer.name }} · {{ customer.phone|default:"No phone" }}</p>
    </div>

    <form method="post" enctype="multipart/form-data" class="pet-form-card">
        {% csrf_token %}

        <div class="layout">
            <div class="photo-box">
                <div class="photo-preview" id="photoPreviewBox">
                    {% if pet and pet.photo %}
                        <img src="{{ pet.photo.url }}" id="photoPreview">
                        <div id="photoEmpty" style="display:none;">🐾</div>
                    {% else %}
                        <div id="photoEmpty">🐾</div>
                        <img src="" id="photoPreview" style="display:none;">
                    {% endif %}
                </div>

                <label class="upload-btn">
                    Upload Pet Photo
                    <input type="file" name="photo" id="photoInput" accept="image/*" onchange="previewPhoto(event)">
                </label>

                <small>Dog/cat profile photo for customer record.</small>
            </div>

            <div class="fields">
                <div class="grid">
                    <label>
                        Pet Name
                        <input name="pet_name" value="{{ pet.pet_name|default:'' }}" placeholder="Example: Coco">
                    </label>

                    <label>
                        Pet Type
                        <select name="pet_type">
                            <option value="dog" {% if pet and pet.pet_type == "dog" %}selected{% endif %}>Dog</option>
                            <option value="cat" {% if pet and pet.pet_type == "cat" %}selected{% endif %}>Cat</option>
                            <option value="other" {% if pet and pet.pet_type == "other" %}selected{% endif %}>Other</option>
                        </select>
                    </label>

                    <label>
                        Breed
                        <input name="breed" value="{{ pet.breed|default:'' }}" placeholder="Poodle, Persian...">
                    </label>

                    <label>
                        Sex
                        <select name="gender">
                            <option value="">Choose</option>
                            <option value="Male" {% if pet and pet.gender == "Male" %}selected{% endif %}>Male</option>
                            <option value="Female" {% if pet and pet.gender == "Female" %}selected{% endif %}>Female</option>
                        </select>
                    </label>

                    <label>
                        Color
                        <input name="color" value="{{ pet.color|default:'' }}" placeholder="Brown, white...">
                    </label>

                    <label>
                        Age Text
                        <input name="age_text" value="{{ pet.age_text|default:'' }}" placeholder="Example: 8 months">
                    </label>

                    <label>
                        Birth Date
                        <input type="date" name="birth_date" value="{{ pet.birth_date|date:'Y-m-d' }}">
                    </label>

                    <label>
                        Source
                        <select name="source">
                            <option value="customer_own" {% if pet and pet.source == "customer_own" %}selected{% endif %}>Customer Own Pet</option>
                            <option value="bubu_sale" {% if pet and pet.source == "bubu_sale" %}selected{% endif %}>Bought at BUBU</option>
                            <option value="bubu_preorder" {% if pet and pet.source == "bubu_preorder" %}selected{% endif %}>BUBU Pre-order</option>
                        </select>
                    </label>

                    <label>
                        Bought Date
                        <input type="date" name="bought_date" value="{{ pet.bought_date|date:'Y-m-d' }}">
                    </label>

                    <label>
                        Warranty Start
                        <input type="date" name="warranty_start_date" value="{{ pet.warranty_start_date|date:'Y-m-d' }}">
                    </label>

                    <label>
                        Warranty Expire
                        <input type="date" name="warranty_expire_date" value="{{ pet.warranty_expire_date|date:'Y-m-d' }}">
                    </label>
                </div>

                <label class="full">
                    Remark
                    <textarea name="note" placeholder="Health, behavior, grooming note...">{{ pet.note|default:'' }}</textarea>
                </label>

                <div class="actions">
                    <button type="submit" class="save-btn">💾 Save Pet Profile</button>
                    <a href="{% url 'customer_detail' customer.id %}" class="cancel-btn">Cancel</a>
                </div>
            </div>
        </div>
    </form>
</div>

<style>
*{box-sizing:border-box}
a{text-decoration:none}

.pet-form-page{
    padding:24px 28px;
}

.form-head{
    margin-bottom:22px;
}

.form-head h1{
    margin:0;
    font-size:36px;
    font-weight:1000;
    color:#17152f;
}

.form-head p{
    color:#7b7288;
    font-weight:900;
}

.pet-form-card{
    background:white;
    border:1px solid #f1ddd1;
    border-radius:30px;
    padding:24px;
    box-shadow:0 18px 40px rgba(130,91,60,.08);
}

.layout{
    display:grid;
    grid-template-columns:340px 1fr;
    gap:24px;
}

.photo-box{
    background:#fff8f4;
    border:2px solid #ffe1d6;
    border-radius:28px;
    padding:18px;
}

.photo-preview{
    height:320px;
    border-radius:24px;
    background:white;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    font-size:90px;
}

.photo-preview img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.upload-btn{
    width:100%;
    min-height:60px;
    margin-top:16px;
    border-radius:20px;
    background:linear-gradient(135deg,#8e63ff,#ff8c6b);
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:1000;
    cursor:pointer;
}

.upload-btn input{
    display:none;
}

.photo-box small{
    display:block;
    margin-top:10px;
    color:#7b7288;
    font-weight:900;
    text-align:center;
}

.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:16px;
}

label{
    font-weight:1000;
    color:#17152f;
}

input,
select,
textarea{
    width:100%;
    border:2px solid #eaddec;
    border-radius:18px;
    padding:0 16px;
    margin-top:8px;
    font-size:16px;
    font-weight:900;
    outline:none;
    background:white;
}

input,
select{
    height:60px;
}

textarea{
    padding:16px;
    min-height:120px;
}

input:focus,
select:focus,
textarea:focus{
    border-color:#8e63ff;
    box-shadow:0 0 0 5px rgba(142,99,255,.12);
}

.full{
    display:block;
    margin-top:16px;
}

.actions{
    display:flex;
    justify-content:flex-end;
    gap:12px;
    margin-top:20px;
}

.save-btn,
.cancel-btn{
    min-height:60px;
    padding:0 24px;
    border-radius:20px;
    border:0;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    font-weight:1000;
}

.save-btn{
    background:linear-gradient(135deg,#13a85f,#7b5cff);
    color:white;
}

.cancel-btn{
    background:#fff0f0;
    color:#ff4d5d;
}

@media(max-width:1100px){
    .layout{
        grid-template-columns:1fr;
    }

    .grid{
        grid-template-columns:1fr 1fr;
    }
}

@media(max-width:700px){
    .pet-form-page{
        padding:18px;
    }

    .grid{
        grid-template-columns:1fr;
    }

    .actions{
        display:grid;
    }

    .save-btn,
    .cancel-btn{
        width:100%;
    }
}
</style>

<script>
function previewPhoto(event){
    const file = event.target.files && event.target.files[0];
    if(!file) return;

    const img = document.getElementById("photoPreview");
    const empty = document.getElementById("photoEmpty");

    const reader = new FileReader();
    reader.onload = function(e){
        img.src = e.target.result;
        img.style.display = "block";
        if(empty) empty.style.display = "none";
    };
    reader.readAsDataURL(file);
}
</script>

{% endblock %}
