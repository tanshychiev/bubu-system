{% extends "base.html" %}
{% block content %}

<div class="card" style="max-width:600px;margin:0 auto;text-align:center;">
    <h1>Delete Role 🗑</h1>
    <p class="page-subtitle">Are you sure you want to delete this role?</p>

    <h2>{{ role.name }}</h2>

    <form method="post" class="tool-row" style="justify-content:center;margin-top:24px;">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'role_list' %}" class="btn btn-reset">Cancel</a>
    </form>
</div>

{% endblock %}
