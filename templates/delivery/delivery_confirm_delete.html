{% extends "base.html" %}

{% block content %}
<h1>Delete Delivery</h1>

<p>Are you sure you want to delete this delivery?</p>
<p><strong>{{ delivery.customer_name }}</strong> - {{ delivery.phone }}</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Yes, Delete</button>
    <a href="{% url 'delivery_detail' delivery.id %}">Cancel</a>
</form>
{% endblock %}
