{% extends "base.html" %}

{% block content %}

<style>
.page {
    max-width: 720px;
    margin: auto;
}

.back-btn {
    display:inline-flex;
    padding:13px 24px;
    border-radius:999px;
    background:white;
    border:1px solid #eaddec;
    color:#6b6178;
    font-weight:900;
    text-decoration:none;
    margin-bottom:18px;
}

.card {
    background:white;
    border:1px solid #f5e8df;
    border-radius:30px;
    padding:26px;
    box-shadow:0 20px 50px rgba(130,91,60,.10);
    text-align:center;
}

h1 {
    color:#17152f;
    font-size:34px;
    margin:0 0 8px;
    font-weight:900;
}

p {
    color:#7b7288;
    font-weight:800;
}

.label-box {
    width:58mm;
    min-height:38mm;
    margin:25px auto;
    border:1px dashed #ccc;
    padding:8px;
    background:white;
    color:black;
    text-align:center;
}

.label-name {
    font-size:12px;
    font-weight:900;
    margin-bottom:3px;
}

.label-info {
    font-size:10px;
    margin-bottom:4px;
}

.barcode-img {
    width:100%;
    height:auto;
}

.price {
    font-size:13px;
    font-weight:900;
    margin-top:3px;
}

.btn-print {
    border:none;
    border-radius:999px;
    padding:15px 34px;
    color:white;
    font-weight:900;
    background:linear-gradient(135deg,#9b7cf6,#ff8c6b);
    box-shadow:0 12px 26px rgba(155,124,246,.25);
    cursor:pointer;
}

@media print {
    body * {
        visibility: hidden;
    }

    .label-box,
    .label-box * {
        visibility: visible;
    }

    .label-box {
        position: absolute;
        left: 0;
        top: 0;
        border: none;
        margin: 0;
        width:58mm;
    }

    @page {
        size: 58mm 38mm;
        margin: 0;
    }
}
</style>

<div class="page">

    <a href="{% url 'item_detail' item.id %}" class="back-btn">← Back</a>

    <div class="card">
        <h1>Barcode Label 🏷️</h1>
        <p>{{ item.name }} — {{ variant.display_name }}</p>

        <div class="label-box">
            <div class="label-name">{{ item.name }}</div>
            <div class="label-info">{{ variant.display_name }}</div>

            <img class="barcode-img" src="data:image/png;base64,{{ barcode_base64 }}">

            <div class="label-info">{{ variant.sku }}</div>
            <div class="price">${{ variant.sale_price|floatformat:2 }}</div>
        </div>

        <button onclick="window.print()" class="btn-print">Print Barcode</button>
    </div>

</div>

{% endblock %}
