{% extends "base.html" %}
{% block content %}

<style>
.form-page{max-width:650px;margin:auto;}
.back-btn{display:inline-flex;padding:13px 24px;border-radius:999px;background:white;border:1px solid #eaddec;color:#6b6178;font-weight:900;text-decoration:none;margin-bottom:18px;}
.form-card{background:white;border:1px solid #f5e8df;border-radius:30px;padding:26px;box-shadow:0 20px 50px rgba(130,91,60,.10);}
h1{font-size:36px;color:#17152f;margin:0 0 8px;font-weight:900;}
p{color:#7b7288;font-weight:800;margin-bottom:22px;}
.form-box{margin-bottom:16px;}
.form-box label{display:block;font-weight:900;color:#17152f;margin-bottom:8px;}
.form-box input{width:100%;height:54px;border-radius:18px;border:1px solid #eaddec;padding:0 14px;font-weight:800;background:white;}
.form-box input[type="checkbox"]{width:auto;height:auto;}
.btn-save{border:none;border-radius:999px;padding:15px 34px;color:white;font-weight:900;background:linear-gradient(135deg,#9b7cf6,#ff8c6b);box-shadow:0 12px 26px rgba(155,124,246,.25);}
</style>

<div class="form-page">
    <a href="{% url 'item_list' %}" class="back-btn">← Back</a>

    <div class="form-card">
        <h1>{{ title }} 🏷️</h1>
        <p>Create category/type first. Example: Food, Clothes, Shampoo, Medicine.</p>

        <form method="post">
            {% csrf_token %}

            <div class="form-box">
                <label>Type Name</label>
                {{ form.name }}
            </div>

            <div class="form-box">
                <label>Emoji</label>
                {{ form.emoji }}
            </div>

            <div class="form-box">
                <label>Active</label>
                {{ form.is_active }}
            </div>

            <button class="btn-save" type="submit">Save Type</button>
        </form>
    </div>
</div>

{% endblock %}
