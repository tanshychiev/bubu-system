{% extends "base.html" %}
{% block content %}

<style>
.form-page{
    max-width:650px;
    margin:auto;
}

.back-btn{
    display:inline-flex;
    min-height:40px;
    padding:0 18px;
    border-radius:999px;
    align-items:center;
    background:white;
    border:1px solid #eaddec;
    color:#6b6178;
    font-weight:900;
    text-decoration:none;
    margin-bottom:14px;
}

.form-card{
    background:white;
    border:1px solid #f5e8df;
    border-radius:24px;
    padding:22px;
    box-shadow:0 16px 38px rgba(130,91,60,.08);
}

.form-card h1{
    font-size:30px;
    color:#17152f;
    margin:0 0 6px;
    font-weight:900;
}

.form-card p{
    color:#7b7288;
    font-weight:800;
    margin:0 0 18px;
}

.form-box{
    margin-bottom:13px;
}

.form-box label{
    display:block;
    font-weight:900;
    color:#17152f;
    margin-bottom:5px;
}

.form-box input{
    width:100%;
    min-height:48px;
    border-radius:14px;
    border:1px solid #eaddec;
    padding:0 12px;
    font-weight:800;
    background:white;
}

.form-box input[type="checkbox"]{
    width:22px;
    min-height:22px;
}

.btn-save{
    min-height:44px;
    border:none;
    border-radius:13px;
    padding:0 24px;
    color:white;
    font-weight:900;
    background:linear-gradient(135deg,#9b7cf6,#ff8c6b);
    box-shadow:0 9px 20px rgba(155,124,246,.20);
}

@media(max-width:700px){
    .form-page{
        width:100%;
        max-width:none;
        margin:0;
    }

    .back-btn{
        min-height:33px;
        margin-bottom:6px;
        padding:0 9px;
        border-radius:9px;
        font-size:9px;
    }

    .form-card{
        padding:10px;
        border-radius:13px;
        box-shadow:none;
    }

    .form-card h1{
        margin-bottom:3px;
        font-size:19px;
    }

    .form-card p{
        margin-bottom:9px;
        font-size:9px;
        line-height:1.35;
    }

    .form-box{
        margin-bottom:7px;
    }

    .form-box label{
        margin-bottom:3px;
        font-size:9px;
    }

    .form-box input{
        min-height:40px;
        border-radius:9px;
        padding:0 9px;
        font-size:16px!important;
    }

    .form-box input[type="checkbox"]{
        width:20px;
        min-height:20px;
    }

    .btn-save{
        width:100%;
        min-height:40px;
        border-radius:9px;
        font-size:10px;
    }
}
</style>

<div class="form-page">
    <a href="{% url 'item_list' %}" class="back-btn">← Back</a>

    <div class="form-card">
        <h1>{{ title }} 🏷️</h1>
        <p>Create category/type first. Example: Food, Clothes, Shampoo, Medicine.</p>

        <form method="post">
            {% csrf_token %}

            <div class="form-box">
                <label>Type Name</label>
                {{ form.name }}
            </div>

            <div class="form-box">
                <label>Emoji</label>
                {{ form.emoji }}
            </div>

            <div class="form-box">
                <label>Active</label>
                {{ form.is_active }}
            </div>

            <button class="btn-save" type="submit">Save Type</button>
        </form>
    </div>
</div>

{% endblock %}
