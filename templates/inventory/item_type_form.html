{% extends "base.html" %}
{% block content %}

<div class="itf-page">
    <a href="{% url 'item_list' %}" class="itf-back">← Back</a>

    <form method="post" class="itf-card">
        {% csrf_token %}

        <div class="itf-head">
            <div>
                <h1>{{ title }} 🏷️</h1>
                <p>Create a category such as Food, Clothes, Shampoo or Medicine.</p>
            </div>
            <span>Inventory Type</span>
        </div>

        <div class="itf-grid">
            <label>
                Type Name
                {{ form.name }}
            </label>

            <label>
                Emoji
                {{ form.emoji }}
            </label>
        </div>

        <label class="itf-status">
            <div>
                <strong>Active</strong>
                <small>Show this type in inventory and selectors.</small>
            </div>
            {{ form.is_active }}
        </label>

        <button type="submit" class="itf-save">💾 Save Type</button>
    </form>
</div>

<style>
*{box-sizing:border-box}
a{text-decoration:none}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%}

.itf-page{width:min(650px,100%);margin:auto;padding:18px}
.itf-back{min-height:42px;margin-bottom:10px;padding:0 14px;border:1px solid #eaddec;border-radius:13px;display:inline-flex;align-items:center;color:#6b6178;background:white;font-weight:1000}
.itf-card{padding:20px;border:1px solid #f5e8df;border-radius:22px;background:white;box-shadow:0 14px 34px rgba(130,91,60,.07)}
.itf-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:16px}
.itf-head h1{margin:0;color:#17152f;font-size:28px;font-weight:1000}
.itf-head p{margin:5px 0 0;color:#7b7288;font-size:12px;font-weight:900}
.itf-head>span{padding:7px 10px;border-radius:999px;color:#7b5cff;background:#f1ebff;font-size:9px;font-weight:1000}
.itf-grid{display:grid;grid-template-columns:1fr 150px;gap:10px}
.itf-card label{color:#17152f;font-size:12px;font-weight:1000}
.itf-card input:not([type="checkbox"]){width:100%;height:48px;margin-top:5px;padding:0 12px;border:1.5px solid #eaddec;border-radius:13px;background:white;font-size:16px;font-weight:900;outline:none}
.itf-card input:focus{border-color:#8e63ff;box-shadow:0 0 0 3px rgba(142,99,255,.12)}
.itf-status{min-height:58px;margin-top:11px;padding:9px 12px;border:1px solid #f0e5ee;border-radius:14px;display:flex;align-items:center;justify-content:space-between;gap:10px;background:#fff8fb}
.itf-status strong,.itf-status small{display:block}
.itf-status small{margin-top:2px;color:#7b7288;font-size:10px}
.itf-status input{width:22px;height:22px;accent-color:#8e63ff}
.itf-save{width:100%;min-height:48px;margin-top:12px;border:0;border-radius:13px;color:white;background:linear-gradient(135deg,#8e63ff,#ff8c6b);font-weight:1000}

@media(max-width:700px){
    .itf-page{padding:7px 6px}
    .itf-back{min-height:35px;margin-bottom:6px;padding:0 9px;border-radius:9px;font-size:10px}
    .itf-card{padding:8px;border-radius:14px;box-shadow:none}
    .itf-head{margin-bottom:7px}
    .itf-head h1{font-size:20px}
    .itf-head p{display:none}
    .itf-grid{grid-template-columns:minmax(0,1fr) 86px;gap:5px}
    .itf-card label{font-size:9px}
    .itf-card input:not([type="checkbox"]){height:43px;margin-top:3px;padding:0 8px;border-radius:9px;font-size:16px!important}
    .itf-status{min-height:45px;margin-top:6px;padding:6px 8px;border-radius:9px}
    .itf-status small{display:none}
    .itf-save{min-height:43px;margin-top:6px;border-radius:9px;font-size:11px}
}
</style>

{% endblock %}
