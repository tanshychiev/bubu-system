{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>BUBU Pet Store</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
*{
    box-sizing:border-box;
}

html,
body{
    margin:0;
    width:100%;
    min-height:100%;
    overflow-x:hidden;
    font-family:'Nunito',sans-serif;
    background:#fffaf6;
    color:#17152f;
}

a{
    text-decoration:none;
}

/* SIDEBAR */
.sidebar{
    width:230px;
    height:100vh;
    position:fixed;
    left:0;
    top:0;
    background:linear-gradient(180deg,#fff6ee,#ffe9d7);
    border-right:1px solid #f1d8c4;
    padding:24px 16px 16px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

/* LOGO */
.logo{
    text-align:center;
    flex-shrink:0;
    margin-bottom:18px;
}

.logo-img{
    width:118px;
    height:auto;
    object-fit:contain;
    background:transparent;
    margin-bottom:8px;
}

.logo h3{
    margin:0;
    font-size:25px;
    font-weight:900;
    color:#4a2f2a;
}

.logo small{
    color:#8d6b5b;
    font-weight:700;
}

/* MENU */
.menu{
    flex:1;
    overflow-y:auto;
    overflow-x:hidden;
    padding-right:4px;
    scrollbar-width:thin;
    scrollbar-color:#d7b8ff transparent;
}

.menu::-webkit-scrollbar{
    width:6px;
}

.menu::-webkit-scrollbar-track{
    background:transparent;
}

.menu::-webkit-scrollbar-thumb{
    background:#d7b8ff;
    border-radius:999px;
}

.menu a{
    display:flex;
    align-items:center;
    gap:13px;
    padding:12px 14px;
    margin:6px 0;
    border-radius:20px;
    color:#5c4b45;
    font-weight:800;
    transition:.2s;
    white-space:nowrap;
}

.menu a:hover,
.menu a.active{
    background:white;
    color:#17152f;
    box-shadow:0 12px 28px rgba(130,91,60,.12);
    transform:translateX(4px);
}

/* SIDEBAR BOTTOM */
.sidebar-footer{
    flex-shrink:0;
    text-align:center;
    padding-top:12px;
    margin-top:auto;
}

.sleep-cat-img{
    width:160px;
    display:block;
    margin:18px auto 16px;
    object-fit:contain;
    pointer-events:none;
}

.logout-btn{
    width:100%;
    min-height:44px;
    justify-content:center;
    background:white;
    color:#ff6b4a !important;
    border:1px solid #f1d8c4;
    border-radius:999px;
    font-weight:900;
    box-shadow:0 8px 18px rgba(130,91,60,.08);
}

.logout-btn:hover{
    background:#ffe8e2 !important;
    transform:translateY(-2px) !important;
}

.server-text{
    margin-top:10px;
    font-size:13px;
    color:#9c8a83;
    font-weight:700;
}

/* MAIN */
.main{
    margin-left:230px;
    min-height:100vh;
    background:
        radial-gradient(circle at 88% 18%,#fff0f7 0,transparent 28%),
        linear-gradient(135deg,#fffaf6,#ffffff);
    overflow-x:hidden;
}

.topbar{
    height:74px;
    background:rgba(255,255,255,.86);
    backdrop-filter:blur(14px);
    border-bottom:1px solid #f1d8c4;
    display:flex;
    justify-content:flex-end;
    align-items:center;
    padding:0 36px;
}

.top-actions{
    display:flex;
    align-items:center;
    gap:18px;
}

.open-pos{
    background:linear-gradient(135deg,#ff9d6c,#ff7f61);
    color:white;
    padding:12px 24px;
    border-radius:30px;
    font-size:14px;
    font-weight:900;
    box-shadow:0 12px 25px rgba(255,127,97,.25);
    transition:.2s;
}

.bell,
.avatar{
    font-size:25px;
}

.content{
    padding:58px;
    overflow-x:hidden;
}

/* PAGE HEADER */
.page-head{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:28px;
}

h1{
    font-size:36px;
    font-weight:900;
    margin:0 0 8px;
    letter-spacing:-.5px;
}

.page-subtitle{
    color:#7b7288;
    font-weight:700;
    margin-bottom:28px;
}

.pet-hero-img,
.dashboard-hero{
    width:360px;
    max-width:100%;
    object-fit:contain;
    margin-top:-25px;
}

/* FORMS */
.tool-row{
    display:flex;
    gap:12px;
    align-items:center;
    margin-bottom:32px;
    flex-wrap:wrap;
}

.search-input,
input,
select,
textarea{
    border:1px solid #eaddec;
    border-radius:24px;
    padding:13px 16px;
    outline:none;
    background:white;
    font-family:'Nunito',sans-serif;
    font-weight:800;
    max-width:100%;
}

.search-input{
    width:230px;
    height:44px;
}

input:focus,
select:focus,
textarea:focus{
    border-color:#b99cff;
    box-shadow:0 0 0 4px rgba(155,124,246,.13);
}

/* BUTTONS */
.btn,
button{
    min-height:44px;
    border:0;
    border-radius:24px;
    padding:0 24px;
    font-weight:900;
    text-decoration:none;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    cursor:pointer;
    font-family:'Nunito',sans-serif;
    transition:.2s;
}

.btn:hover,
button:hover,
.mini-btn:hover,
.open-pos:hover{
    transform:translateY(-2px);
}

.btn-search,
.btn-add,
.btn-primary{
    color:white;
    background:linear-gradient(135deg,#9b7cf6,#ff8c6b);
    box-shadow:0 12px 25px rgba(155,124,246,.25);
}

.btn-reset{
    background:white;
    color:#6b6178;
    border:1px solid #eaddec;
}

.btn-danger{
    background:linear-gradient(135deg,#ff7a7a,#ff9a6b);
    color:white;
}

.mini-btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:5px;
    padding:8px 13px;
    border-radius:16px;
    font-size:13px;
    font-weight:900;
    text-decoration:none;
    margin:2px;
    transition:.2s;
}

.btn-view{background:#eaf6ff;color:#3a96ee;}
.btn-edit{background:#f0e9ff;color:#7e57e8;}
.btn-delete{background:#ffe8e2;color:#ff6b4a;}

/* CARDS + TABLE */
.card,
.table-card{
    background:rgba(255,255,255,.92);
    border-radius:28px;
    box-shadow:0 20px 50px rgba(130,91,60,.10);
    border:1px solid #f5e8df;
}

.card{
    padding:26px;
    margin-bottom:24px;
}

.table-card{
    overflow:hidden;
}

table{
    width:100%;
    border-collapse:collapse;
}

thead{
    background:linear-gradient(135deg,#f3eaff,#fff0f6);
}

th{
    padding:18px;
    font-size:14px;
    font-weight:900;
    text-align:center;
    color:#17152f;
}

td{
    padding:18px;
    text-align:center;
    border-top:1px solid #f7eee8;
    font-weight:800;
    color:#514a5f;
}

tbody tr:hover{
    background:#fffaf6;
}

/* EMPTY */
.empty-box{
    min-height:390px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
}

.empty-icon{
    font-size:80px;
    opacity:.75;
    margin-bottom:14px;
}

.empty-box h3{
    margin:0 0 10px;
    font-size:21px;
    font-weight:900;
}

.empty-box p{
    margin:0 0 25px;
    color:#7b7288;
    font-weight:700;
    line-height:1.5;
}

/* BADGES */
.badge{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    padding:8px 14px;
    border-radius:999px;
    font-weight:900;
    font-size:13px;
}

.badge-green{background:#e5faee;color:#28c76f;}
.badge-blue{background:#e7f5ff;color:#2299e8;}
.badge-purple{background:#f3e8ff;color:#a855f7;}
.badge-orange{background:#fff3dd;color:#ff9f1a;}
.badge-red{background:#ffe7ec;color:#ff4d6d;}

/* DASHBOARD */
.grid-cards{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
    margin-bottom:25px;
}

.grid-main{
    display:grid;
    grid-template-columns:2fr 1fr 1fr;
    gap:20px;
}

.stat{
    display:flex;
    justify-content:space-between;
    align-items:center;
    min-height:135px;
}

.stat small{
    color:#6b6480;
    font-size:15px;
    font-weight:900;
}

.stat h2{
    margin:12px 0 6px;
    font-size:31px;
}

.stat span{
    font-size:13px;
    font-weight:900;
}

.stat .icon{
    width:70px;
    height:70px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:32px;
}

.stat.purple{background:linear-gradient(135deg,#fbf7ff,#f0e7ff);}
.stat.orange{background:linear-gradient(135deg,#fffaf6,#fff0e8);}
.stat.blue{background:linear-gradient(135deg,#f8fcff,#eaf6ff);}
.stat.green{background:linear-gradient(135deg,#fbfffc,#eafaf1);}

.stat.purple .icon{background:#e6d4ff;}
.stat.orange .icon{background:#ffd9c8;}
.stat.blue .icon{background:#d8ecff;}
.stat.green .icon{background:#d9f5e4;}

.card.big{
    min-height:350px;
    position:relative;
}

.card.side{
    min-height:350px;
}

.fake-chart{
    height:155px;
    border-radius:20px;
    margin:20px 0;
    background:
        linear-gradient(180deg,rgba(155,124,246,.30),rgba(155,124,246,.04)),
        repeating-linear-gradient(to bottom,transparent 0 38px,#efe8ff 39px 40px);
}

.chart-footer{
    display:flex;
    gap:12px;
}

.chart-footer > div{
    flex:1;
    background:#fff7fb;
    border:1px solid #f1e4ef;
    border-radius:16px;
    padding:14px;
    font-weight:800;
}

.chart-cat{
    position:absolute;
    right:18px;
    bottom:8px;
    width:115px;
}

.order,
.stock{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:11px 0;
    border-bottom:1px solid #f5e8ef;
    font-weight:800;
}

.alert-dog{
    width:115px;
    float:right;
    margin-top:8px;
}

.footer-box{
    margin-top:20px;
    background:linear-gradient(135deg,#f5eaff,#fff0f9);
}

/* FOOTER */
.footer{
    text-align:center;
    margin-top:42px;
    color:#9a91a7;
    font-weight:800;
}

/* RESPONSIVE */
@media(max-width:1100px){
    .grid-cards{
        grid-template-columns:repeat(2,1fr);
    }

    .grid-main{
        grid-template-columns:1fr;
    }
}

@media(max-width:900px){
    .sidebar{
        width:82px;
        padding:20px 8px;
    }

    .logo h3,
    .logo small,
    .sidebar-footer{
        display:none;
    }

    .logo-img{
        width:64px;
        margin-bottom:10px;
    }

    .menu a{
        justify-content:center;
        font-size:0;
        padding:13px 8px;
    }

    .menu a span:first-child{
        font-size:22px;
    }

    .main{
        margin-left:82px;
    }

    .topbar{
        padding:0 18px;
    }

    .content{
        padding:28px;
    }

    .pet-hero-img,
    .dashboard-hero{
        display:none;
    }

    .search-input{
        width:100%;
    }

    .table-card{
        overflow-x:auto;
    }

    .grid-cards{
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

<div class="sidebar">
    <div class="logo">
        <img src="{% static 'img/bubu-logo.png' %}" class="logo-img" alt="BUBU Logo">
        <h3>BUBU</h3>
        <small>Pet Store POS</small>
    </div>

    <div class="menu">
        <a href="{% url 'dashboard' %}" class="{% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
            <span>🏠</span><span>Dashboard</span>
        </a>

        <a href="{% url 'pos' %}" class="{% if request.resolver_match.url_name == 'pos' %}active{% endif %}">
            <span>🛍️</span><span>POS</span>
        </a>

        <a href="{% url 'sale_list' %}" class="{% if request.resolver_match.url_name == 'sale_list' %}active{% endif %}">
            <span>📊</span><span>Sales</span>
        </a>

        <a href="{% url 'item_list' %}" class="{% if request.resolver_match.url_name == 'item_list' %}active{% endif %}">
            <span>📦</span><span>Inventory</span>
        </a>
        
        <a href="{% url 'branch_list' %}" class="{% if request.resolver_match.url_name == 'branch_list' %}active{% endif %}">
    <span>🏪</span><span>Shops</span>
</a>

        <a href="{% url 'purchase_list' %}" class="{% if request.resolver_match.url_name == 'purchase_list' %}active{% endif %}">
            <span>🛒</span><span>Purchases</span>
        </a>

        <a href="{% url 'customer_list' %}" class="{% if request.resolver_match.url_name == 'customer_list' %}active{% endif %}">
            <span>👥</span><span>Customers</span>
        </a>

        <a href="{% url 'service_list' %}" class="{% if request.resolver_match.url_name == 'service_list' %}active{% endif %}">
            <span>✂️</span><span>Services</span>
        </a>

        <a href="{% url 'delivery_list' %}" class="{% if request.resolver_match.url_name == 'delivery_list' %}active{% endif %}">
            <span>🚚</span><span>Delivery</span>
        </a>

        {% if perms.auth.view_user %}
<a href="{% url 'user_list' %}" class="{% if request.resolver_match.url_name == 'user_list' %}active{% endif %}">
    <span>🔒</span><span>Users</span>
</a>
{% endif %}
    </div>

    <div class="sidebar-footer">
        <img src="{% static 'img/sleep-cat.png' %}" class="sleep-cat-img" alt="Sleeping cat">

        <a href="{% url 'logout' %}" class="btn logout-btn">
            <span>🔓</span><span>Logout</span>
        </a>

    
    </div>
</div>

<div class="main">
    <div class="topbar">
        <div class="top-actions">
            <a class="open-pos" href="{% url 'pos' %}">🛍️ Open POS</a>
            <div class="bell">🔔</div>
            <div class="avatar">🐶</div>
        </div>
    </div>

    <div class="content">
        {% block content %}{% endblock %}

        <div class="footer">
            © 2026 BUBU Pet Store POS • Made with 💜
        </div>
    </div>
</div>

</body>
</html>
