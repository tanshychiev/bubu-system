{% extends "base.html" %}

{% block content %}

<div class="rate-page">
    <div class="rate-card">
        <div class="rate-head">
            <div>
                <span class="page-kicker">POS SETTING</span>
                <h1>Exchange Rate</h1>
                <p>Set the USD to KHR rate used in POS payments.</p>
            </div>

            <a href="{% url 'pos' %}" class="back-btn">← Back to POS</a>
        </div>

        <form method="post" class="rate-form">
            {% csrf_token %}

            <label for="exchangeRateInput">1 USD equals</label>

            <div class="rate-input-row">
                <input
                    id="exchangeRateInput"
                    type="number"
                    name="exchange_rate"
                    step="1"
                    min="1"
                    inputmode="numeric"
                    value="{{ setting.exchange_rate }}"
                    required
                >
                <span>KHR</span>
            </div>

            <button type="submit" class="save-btn">
                Save Exchange Rate
            </button>
        </form>

        <div class="rate-preview">
            <div class="preview-icon">💱</div>
            <div>
                <small>Current rate</small>
                <strong>1 USD = {{ setting.exchange_rate }} KHR</strong>
            </div>
        </div>
    </div>
</div>

<style>
*{box-sizing:border-box}
a{text-decoration:none}

.rate-page{
    min-height:80vh;
    padding:40px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#fff8f4;
}

.rate-card{
    width:620px;
    max-width:100%;
    padding:32px;
    border:2px solid #f5e0d8;
    border-radius:30px;
    background:white;
    box-shadow:0 22px 50px rgba(130,91,60,.14);
}

.rate-head{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:16px;
    margin-bottom:28px;
}

.page-kicker{
    display:inline-flex;
    min-height:28px;
    padding:0 10px;
    align-items:center;
    border-radius:999px;
    color:#7b5cff;
    background:#f0eaff;
    font-size:11px;
    font-weight:1000;
}

.rate-head h1{
    margin:8px 0 0;
    color:#080634;
    font-size:30px;
    font-weight:1000;
}

.rate-head p{
    margin:8px 0 0;
    color:#81758f;
    font-weight:800;
}

.back-btn{
    min-height:46px;
    padding:0 18px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    border-radius:16px;
    color:#7b5cff;
    background:#f3f0ff;
    font-weight:1000;
    white-space:nowrap;
}

.rate-form label{
    display:block;
    margin-bottom:10px;
    color:#080634;
    font-size:18px;
    font-weight:1000;
}

.rate-input-row{
    display:grid;
    grid-template-columns:1fr 90px;
    gap:12px;
    align-items:center;
}

.rate-input-row input{
    width:100%;
    height:68px;
    padding:0 20px;
    border:2px solid #eaddec;
    border-radius:22px;
    color:#080634;
    background:white;
    outline:none;
    font-size:28px;
    font-weight:1000;
}

.rate-input-row input:focus{
    border-color:#9b7cf6;
    box-shadow:0 0 0 5px rgba(155,124,246,.12);
}

.rate-input-row span{
    height:68px;
    border-radius:22px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#ff5d73;
    background:#fff0f0;
    font-weight:1000;
}

.save-btn{
    width:100%;
    height:62px;
    margin-top:20px;
    border:0;
    border-radius:18px;
    color:white;
    background:linear-gradient(135deg,#9b7cf6,#ff8c6b);
    box-shadow:0 14px 28px rgba(155,124,246,.22);
    font-size:18px;
    font-weight:1000;
    cursor:pointer;
}

.rate-preview{
    margin-top:18px;
    padding:15px;
    border-radius:18px;
    display:flex;
    align-items:center;
    gap:12px;
    background:#f8f6ff;
}

.preview-icon{
    width:46px;
    height:46px;
    flex:0 0 46px;
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:white;
    font-size:22px;
}

.rate-preview small,
.rate-preview strong{
    display:block;
}

.rate-preview small{
    margin-bottom:4px;
    color:#81758f;
    font-size:11px;
    font-weight:900;
}

.rate-preview strong{
    color:#7b5cff;
    font-size:22px;
}

@media(max-width:700px){
    html{
        -webkit-text-size-adjust:100%;
        text-size-adjust:100%;
    }

    .rate-page{
        min-height:auto;
        padding:8px;
        align-items:flex-start;
    }

    .rate-card{
        width:100%;
        padding:12px;
        border-width:1px;
        border-radius:20px;
        box-shadow:0 8px 24px rgba(130,91,60,.08);
    }

    .rate-head{
        display:grid;
        grid-template-columns:minmax(0,1fr) auto;
        align-items:center;
        gap:8px;
        margin-bottom:14px;
    }

    .page-kicker{
        min-height:24px;
        padding:0 8px;
        font-size:9px;
    }

    .rate-head h1{
        margin-top:6px;
        font-size:23px;
        line-height:1.1;
    }

    .rate-head p{
        margin-top:4px;
        font-size:10px;
        line-height:1.3;
    }

    .back-btn{
        min-height:39px;
        padding:0 10px;
        border-radius:11px;
        font-size:10px;
    }

    .rate-form label{
        margin-bottom:6px;
        font-size:12px;
    }

    .rate-input-row{
        grid-template-columns:minmax(0,1fr) 72px;
        gap:7px;
    }

    .rate-input-row input{
        height:52px;
        padding:0 12px;
        border-radius:13px;
        font-size:20px;
    }

    .rate-input-row span{
        height:52px;
        border-radius:13px;
        font-size:12px;
    }

    .save-btn{
        height:48px;
        margin-top:10px;
        border-radius:13px;
        font-size:13px;
        box-shadow:none;
    }

    .rate-preview{
        margin-top:10px;
        padding:9px;
        border-radius:13px;
    }

    .preview-icon{
        width:38px;
        height:38px;
        flex-basis:38px;
        border-radius:11px;
        font-size:18px;
    }

    .rate-preview small{
        font-size:8px;
    }

    .rate-preview strong{
        font-size:14px;
    }

    input,
    select,
    textarea{
        font-size:16px!important;
    }
}
</style>

{% endblock %}
