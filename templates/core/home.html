{% extends "base.html" %}
{% load static %}

{% block content %}

<div class="home-page">
    <div class="home-card">
        <div class="home-text">
            <div class="badge">🐾 BUBU Pet Store</div>

            <h1>Bubu Pet Store System</h1>

            <p>
                Manage POS sales, inventory, customers, purchases, delivery, and reports in one cute system.
            </p>

            <a href="{% url 'dashboard' %}" class="home-btn">
                Go to Dashboard →
            </a>
        </div>

        <div class="home-art">
            🐶🐱
        </div>
    </div>
</div>

<style>
.home-page{
    min-height:70vh;
    padding:36px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.home-card{
    width:100%;
    max-width:1100px;
    min-height:420px;
    padding:46px;
    border-radius:36px;
    background:linear-gradient(135deg,#fff8f4,#f6f2ff);
    border:2px solid #f5e0d8;
    box-shadow:0 24px 60px rgba(130,91,60,.12);
    display:grid;
    grid-template-columns:1.2fr .8fr;
    gap:30px;
    align-items:center;
}

.badge{
    display:inline-flex;
    padding:12px 18px;
    border-radius:999px;
    background:white;
    color:#7b5cff;
    font-size:16px;
    font-weight:1000;
    margin-bottom:18px;
}

.home-text h1{
    margin:0;
    font-size:48px;
    line-height:1.05;
    font-weight:1000;
    color:#080634;
}

.home-text p{
    max-width:620px;
    margin:18px 0 30px;
    font-size:20px;
    line-height:1.6;
    font-weight:800;
    color:#706681;
}

.home-btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:64px;
    padding:0 30px;
    border-radius:999px;
    background:linear-gradient(135deg,#9b7cf6,#ff8c6b);
    color:white;
    font-size:18px;
    font-weight:1000;
    text-decoration:none;
    box-shadow:0 14px 30px rgba(155,124,246,.25);
}

.home-art{
    height:260px;
    border-radius:32px;
    background:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:100px;
}

/* iPad */
@media (min-width:768px) and (max-width:1024px){
    .home-page{
        padding:28px;
    }

    .home-card{
        padding:38px;
        grid-template-columns:1fr;
        text-align:center;
    }

    .home-text p{
        margin-left:auto;
        margin-right:auto;
    }

    .home-art{
        height:190px;
        font-size:82px;
    }
}

/* Phone */
@media (max-width:700px){
    .home-page{
        padding:18px;
    }

    .home-card{
        padding:26px;
        grid-template-columns:1fr;
        text-align:center;
        min-height:auto;
    }

    .home-text h1{
        font-size:34px;
    }

    .home-text p{
        font-size:16px;
    }

    .home-art{
        height:150px;
        font-size:60px;
    }

    .home-btn{
        width:100%;
    }
}
</style>

{% endblock %}
