{% extends "base.html" %}
{% block content %}

<div class="cd-page">
    <section class="cd-card" role="dialog" aria-modal="true" aria-labelledby="deleteTitle">
        <div class="cd-icon">🗑️</div>

        <h1 id="deleteTitle">Delete Customer?</h1>

        <p>
            Delete <strong>{{ customer.name }}</strong>?
            This customer record will be moved according to your system delete behavior.
        </p>

        <form method="post" class="cd-actions">
            {% csrf_token %}
            <button type="submit" class="cd-delete">Yes, Delete</button>
            <a href="{% url 'customer_detail' customer.id %}" class="cd-cancel">Cancel</a>
        </form>
    </section>
</div>

<style>
*{box-sizing:border-box}
a{text-decoration:none}

html{
    -webkit-text-size-adjust:100%;
    text-size-adjust:100%;
}

.cd-page{
    min-height:calc(100vh - 120px);
    min-height:calc(100dvh - 120px);
    padding:20px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.cd-card{
    width:min(460px,100%);
    padding:30px;
    border:1px solid #f1ddd1;
    border-radius:26px;
    text-align:center;
    background:white;
    box-shadow:0 24px 60px rgba(39,27,61,.16);
}

.cd-icon{
    width:74px;
    height:74px;
    margin:0 auto 14px;
    border-radius:24px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#ff4d5d;
    background:#fff0f0;
    font-size:34px;
}

.cd-card h1{
    margin:0;
    color:#17152f;
    font-size:28px;
    font-weight:1000;
}

.cd-card p{
    margin:12px 0 22px;
    color:#7b7288;
    line-height:1.5;
    font-weight:900;
}

.cd-actions{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:9px;
}

.cd-delete,
.cd-cancel{
    min-height:50px;
    border:0;
    border-radius:15px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:14px;
    font-weight:1000;
}

.cd-delete{
    color:white;
    background:linear-gradient(135deg,#ff6b6b,#ff4d5d);
    cursor:pointer;
}

.cd-cancel{
    color:#334155;
    background:#f1f5f9;
}

@media(max-width:700px){
    .cd-page{
        min-height:calc(100dvh - 70px);
        padding:8px;
    }

    .cd-card{
        padding:20px 14px;
        border-radius:20px;
    }

    .cd-icon{
        width:58px;
        height:58px;
        border-radius:18px;
        font-size:27px;
    }

    .cd-card h1{
        font-size:22px;
    }

    .cd-card p{
        margin:9px 0 16px;
        font-size:12px;
    }

    .cd-actions{
        grid-template-columns:1fr;
        gap:6px;
    }

    .cd-delete,
    .cd-cancel{
        min-height:46px;
        border-radius:11px;
        font-size:12px;
    }
}
</style>
