{% extends "base.html" %}
{% block content %}

<style>
.delete-role-card{max-width:560px;margin:0 auto;padding:24px;text-align:center}
.delete-role-card h1{font-size:28px}
.delete-role-actions{display:flex;justify-content:center;gap:10px;margin-top:20px}
@media(max-width:767px){
    .delete-role-card{padding:16px;border-radius:17px}
    .delete-role-card h1{font-size:22px}
    .delete-role-card h2{font-size:18px}
    .delete-role-card .page-subtitle{font-size:11px}
    .delete-role-actions{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:14px}
    .delete-role-actions .btn{width:100%;min-height:38px;padding:0 8px;font-size:10px}
}
</style>

<div class="card delete-role-card">
    <h1>Delete Role 🗑</h1>
    <p class="page-subtitle">Are you sure you want to delete this role?</p>
    <h2>{{ role.name }}</h2>

    <form method="post" class="delete-role-actions">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'role_list' %}" class="btn btn-reset">Cancel</a>
    </form>
</div>



<style id="bubu-phone-easy-upgrade">
/* =========================================================
   BUBU USERS / ROLES — PHONE EASY UPGRADE
========================================================= */

    html,body{
        width:100%!important;
        max-width:100%!important;
        overflow-x:hidden!important;
    }

    .content{
        padding:7px!important;
    }

    .role-wrap,
    .role-list-page,
    .user-form-wrap,
    .user-list-page,
    .permission-list-page,
    .delete-role-card{
        width:100%!important;
        max-width:100%!important;
        margin:0!important;
        padding-left:0!important;
        padding-right:0!important;
    }

    .role-card,
    .user-form-card,
    .delete-role-card{
        padding:10px!important;
        border-radius:15px!important;
        box-shadow:0 6px 18px rgba(60,40,75,.06)!important;
    }

    .role-head,
    .form-head,
    .page-head,
    .panel-head{
        display:flex!important;
        flex-direction:column!important;
        align-items:stretch!important;
        gap:7px!important;
        margin-bottom:10px!important;
    }

    h1{
        font-size:21px!important;
        line-height:1.15!important;
        margin:0!important;
    }

    h2{

    }

    .page-subtitle,

    }

    .form-grid{

    }

        grid-template-columns:1fr!important;

    .permission-item{

        font-size:10px!important;
        border-radius:10px!important;
    }

    .permission-item input{
        width:18px!important;

    }

    .count-row{

    .user-hero{

    }

    .user-title h1{
        font-size:22px!important;
    }

    .user-title p{

    }

    .hero-img{

    }

    .hero-features{
        grid-template-columns:repeat(3,minmax(0,1fr))!important;

        margin-top:10px!important;
    }

    .feature-card{
        padding:8px 6px!important;

    }

    .feature-card b{

    }

    }

    }

    }

    .edit-btn{

    }

    .check-list{
        max-height:none!important;
        overflow:visible!important;
    }

    .check-list ul,
    .check-list > div{

    }

        font-size:10px!important;
        overflow-wrap:anywhere!important;

    td:last-child{
        border-bottom:0!important;
    }

    td::before{
        content:attr(data-label);
        color:#7b7288;
        font-weight:1000;
        text-align:left;
        flex:0 0 42%;
    }

    td[colspan]{
        display:block!important;
        text-align:center!important;
    }

    td[colspan]::before{
        display:none!important;
    }

    .pick-modal{
        padding:10px!important;
        align-items:center!important;
    }

    .pick-box{
        max-height:78vh!important;
        overflow:hidden!important;
        padding:12px!important;
        border-radius:17px!important;
    }

@media (max-width: 380px){
    .user-grid{
        grid-template-columns:1fr!important;
    }

    .action-row,
    .delete-role-actions,
    .search-card,
    .tool-row{

    .tool-row .search-input{

</style>

{% endblock %}
